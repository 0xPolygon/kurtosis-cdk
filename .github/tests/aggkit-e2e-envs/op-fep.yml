# aggkit-e2e env preset: op-fep
# ---------------------------------------------------------------------------
# Topology: single OP-succinct L2 (chain "001"), FEP consensus, op-succinct
#           MOCK prover (op_succinct_mock: true), agglayer integration.
#
# Provenance (faithful mirror of the aggkit CI `read-aggkit-args` composition
# `op_succinct_args`, see agglayer/aggkit/.github/workflows/test-e2e.yml,
# put_args op_succinct_args). Deep-merged with last-wins semantics in this
# order:
#   1. .github/test_e2e_op_args_base.json
#   2. .github/test_e2e_op_succinct_args_base.json
#   3. .github/test_e2e_single_chain_op_succinct_args.json
#
# DEVIATION (plan step P1, snapshot-clean):
#   - DROPPED `bridge_spammer` from `additional_services`. The source
#     composition sets `additional_services: ["bridge_spammer"]` (from
#     test_e2e_op_succinct_args_base.json). bridge_spammer submits bridge
#     transactions before a snapshot would be taken, which violates the P3
#     snapshot.md "no settlement before snapshot" prerequisite. Set to [].
#
# === Finality additions (make a restored OP-Stack L2 actually FINALIZE) ===
# Same load-bearing fix set proven on op-pp / op-pp-2chains, adapted for FEP:
#
#   EL CHOICE = op-reth (NOT op-geth). Unlike op-pp/op-pp-2chains (which pin
#   op-geth), op-fep MUST keep the op-reth EL. The kurtosis-cdk op-succinct /
#   FEP deployment path is hard-coupled to op-reth:
#     - input_parser.star validate(): `deploy_op_succinct` requires the global
#       `sequencer_type == op-reth`, else fail("OP Succinct requires OP Rollup
#       ... Change the sequencer_type parameter to 'op-reth'.").
#     - op_succinct_proposer.create_evm_sketch_genesis() does
#       store_service_files(service_name="op-el-1-op-reth-op-node-001", ...) and
#       sovereign.star / agglayer.star reference the op-reth EL hostname. With an
#       op-geth EL those hostnames don't exist -> the FEP contract-deploy step
#       fails during bring-up. So op-reth is required here; op-geth is not an
#       option for the op-succinct topology.
#
#   op-node finality flags via cl.extra_params (BOTH participants) — identical to
#   op-pp. Overriding extra_params REPLACES the default list, so we re-state the
#   required --rollup.l1-chain-config=/l1/genesis.json and ADD:
#     --l1.http-poll-interval=2s   : match the 2s L1 slot time. op-node's 12s
#         default skips ~6 contiguous L1 blocks/poll -> misread as L1 re-org ->
#         chronic derivation engine resets -> finalized wiped to genesis -> the
#         chain NEVER finalizes.
#     --l1.epoch-poll-interval=12s : refresh L1 safe/finalized fast. The 6m24s
#         default makes finalized advance impractically slowly.
#   (For FEP this is doubly important: op-succinct settlement proves against the
#   finalized L1 batch data.)
#
#   op-batcher: NOT disabled -> optimism-package deploys one batcher per chain
#   (op-batcher:v1.16.9, --data-availability-type=calldata). It posts L2 batch
#   data to the L1 batch-inbox, advancing L2 safe then finalized. The snapshot
#   tool captures it and, for op-reth ELs, adds the `miner` API namespace to the
#   restored op-reth-entrypoint.sh so op-batcher's miner_setMaxDASize succeeds.
#
# Invocation:
#   kurtosis run --enclave op-fep \
#     --args-file .github/tests/aggkit-e2e-envs/op-fep.yml .
# ---------------------------------------------------------------------------
deployment_stages:
  deploy_op_succinct: true
  deploy_cdk_bridge_infra: false

args:
  aggkit_image: aggkit:local
  consensus_contract_type: fep
  use_agg_sender_validator: true
  agg_sender_multisig_threshold: 2
  agg_sender_validator_total_number: 3
  log_level: debug
  # DEVIATION (P1): bridge_spammer removed for a snapshot-clean enclave.
  additional_services: []
  binary_name: aggkit
  aggkit_components: aggsender,aggoracle
  l2_chain_id: 20201
  l2_network_id: 1
  op_succinct_mock: true
  op_succinct_agglayer: true
  op_succinct_agg_proof_mode: compressed
  op_succinct_submission_interval: "1"
  op_succinct_max_concurrent_proof_requests: "1"
  op_succinct_max_concurrent_witness_gen: "1"
  op_succinct_range_proof_interval: "60"

optimism_package:
  chains:
    "001":
      participants:
        # NOTE: providing a participant key skips the _default_chain sequencer
        # role assignment (sequencer1 -> sequencer:true, rpc1 -> sequencer:
        # "sequencer1"), so we re-state the roles explicitly. el/cl are
        # deep-merged over the default participant (op_input_parser.star
        # _parse_participants), but a provided extra_params REPLACES the default
        # list, so we re-state --rollup.l1-chain-config=/l1/genesis.json too.
        # EL is pinned to op-reth (the op-succinct/FEP-required EL — see header).
        sequencer1:
          sequencer: true
          el:
            type: op-reth
            image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-reth:v2.2.5
          cl:
            type: op-node
            extra_params:
              - --rollup.l1-chain-config=/l1/genesis.json
              - --l1.http-poll-interval=2s
              - --l1.epoch-poll-interval=12s
        rpc1:
          sequencer: sequencer1
          el:
            type: op-reth
            image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-reth:v2.2.5
          cl:
            type: op-node
            extra_params:
              - --rollup.l1-chain-config=/l1/genesis.json
              - --l1.http-poll-interval=2s
              - --l1.epoch-poll-interval=12s
      proposer_params:
        enabled: false
      network_params:
        network_id: "20201"
